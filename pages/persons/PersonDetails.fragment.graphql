fragment PersonDetails on Person {
  id
  personId
  personDisplayName
  personFirstName
  personLastName
  personTitle
  personAuthor
  personUsername
  personUpdatedDatetime
  personCreatedDatetime
  personPrivate {
    id
    personId
    personPrivateDateOfBirth
    personPrivatePassportNumber
    personPrivateFrequentFlyerNumber
    personPrivateTsaPrecheckNumber
    personPrivateCreatedDatetime
    personPrivateUpdatedDatetime
    personPrivateAuthor
    physicalAddressId
    physicalAddress {
      id
      physicalAddressId
    }
    emailAddress {
      id
      emailAddress
    }
  }
}
